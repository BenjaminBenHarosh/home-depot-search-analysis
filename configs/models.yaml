model_comparison:
  - name: Random Forest
    class: RandomForestRegressor
    params:
      n_estimators: 15
      max_depth: 6
      random_state: 0
  - name: Gradient Boosting
    class: GradientBoostingRegressor
    params:
      n_estimators: 15
      max_depth: 6
      random_state: 0
  - name: HistGradientBoosting
    class: HistGradientBoostingRegressor
    params:
      max_depth: 6
      random_state: 0
  - name: KNN
    class: KNeighborsRegressor
    params:
      n_neighbors: 5
  - name: Support Vector Regressor
    class: SVR
    pipeline: true
    params:
      kernel: rbf
      C: 1.0
      epsilon: 0.2

model_search:
  random_forest:
    n_estimators: [100, 200, 300]
    max_depth: [6, 10, 14]
    min_samples_split: [2, 5, 10]
    min_samples_leaf: [1, 2, 4]
  gradient_boosting:
    n_estimators: [100, 200, 300]
    max_depth: [3, 5, 7]
    learning_rate: [0.01, 0.05, 0.1]
    min_samples_split: [2, 5, 10]
